services:
  app:
    build:
      context: .
      target: production
    container_name: persfinance-app
    env_file:
      - path: .env
        required: true
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:${PORT:-3000}"
    restart: unless-stopped
    networks:
      - ttd-network

  migrate:
    build:
      context: .
      target: production
    container_name: persfinance-migrate
    env_file:
      - path: .env
        required: true
    command: npm run db:migrate
    profiles:
      - tools
    networks:
      - ttd-network

  seed:
    build:
      context: .
      target: production
    container_name: persfinance-seed
    env_file:
      - path: .env
        required: true
    command: npm run seed:dev
    profiles:
      - tools
    networks:
      - ttd-network

networks:
  ttd-network:
    external: true
