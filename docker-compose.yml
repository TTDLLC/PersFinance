services:
  app:
    build: .
    container_name: persfinance-app
    env_file:
      - path: .env.docker
        required: false
    ports:
      - "${HOST_PORT:-3000}:${PORT:-3000}"
    networks:
      - ttd-network

  migrate:
    build: .
    container_name: persfinance-migrate
    env_file:
      - path: .env.docker
        required: false
    networks:
      - ttd-network
    command: npm run db:migrate
    profiles:
      - tools

  seed:
    build: .
    container_name: persfinance-seed
    env_file:
      - path: .env.docker
        required: false
    networks:
      - ttd-network
    command: npm run seed:dev
    profiles:
      - tools

networks:
  ttd-network:
    external: true
